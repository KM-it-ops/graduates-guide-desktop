name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd engine && npm install
      - run: npm install
      - run: npm test
      - run: npm run privacy-audit
      - run: |
          CAREER_OPS_VAULT=$PWD/fixtures/sanitized-vault node engine/graduates-guide-desktop-api.mjs daily
      - run: |
          CAREER_OPS_VAULT=$PWD/fixtures/sanitized-vault node engine/graduates-guide-desktop-api.mjs queue

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd engine && npm install
      - run: npm install
      - uses: dtolnay/rust-toolchain@stable
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'The Graduate\'s Guide v__VERSION__'
          releaseBody: 'Local-first vault browser. Privacy: no telemetry by default.'
          releaseDraft: true
          args: ${{ matrix.args }}
