name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'app-icon.svg'
      - 'scripts/generate-social-card-og.mjs'
      - 'scripts/generate-hero-png.mjs'
      - 'scripts/privacy-audit.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run privacy-audit:full
      - run: npm run generate:social-card
      - run: npm run generate:hero

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/landing/assets
          cp app-icon.svg _site/
          cp landing/index.html _site/landing/
          cp landing/assets/readme-hero.png _site/landing/assets/
          cp landing/assets/social-card-og.png _site/landing/assets/
          cp landing/assets/hero-ui.svg _site/landing/assets/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';" />
            <meta http-equiv="refresh" content="0; url=landing/" />
            <title>The Graduate's Guide — KM-it-ops</title>
            <meta name="description" content="Your job search lives in a folder you own. Privacy-first desktop cockpit — Copy in app, Send on the portal or in your mail client." />
            <link rel="canonical" href="https://km-it-ops.github.io/graduates-guide-desktop/landing/" />
            <meta property="og:title" content="The Graduate's Guide" />
            <meta property="og:description" content="Your job search lives in a folder you own. Privacy-first desktop cockpit — Copy in app, Send on the portal or in your mail client." />
            <meta property="og:type" content="website" />
            <meta property="og:url" content="https://km-it-ops.github.io/graduates-guide-desktop/landing/" />
            <meta property="og:image" content="https://km-it-ops.github.io/graduates-guide-desktop/landing/assets/social-card-og.png" />
            <meta property="og:image:width" content="1200" />
            <meta property="og:image:height" content="630" />
            <meta property="og:image:type" content="image/png" />
            <meta property="og:image:alt" content="The Graduate's Guide — Copy in the app. Send on the portal or in your mail client." />
            <meta property="og:site_name" content="KM-it-ops" />
            <meta name="twitter:card" content="summary_large_image" />
            <meta name="twitter:title" content="The Graduate's Guide" />
            <meta name="twitter:description" content="Your job search lives in a folder you own. Privacy-first desktop cockpit — Copy in app, Send on the portal or in your mail client." />
            <meta name="twitter:image" content="https://km-it-ops.github.io/graduates-guide-desktop/landing/assets/social-card-og.png" />
            <meta name="twitter:image:alt" content="The Graduate's Guide — Copy in the app. Send on the portal or in your mail client." />
          </head>
          <body>
            <p><a href="landing/">The Graduate's Guide — landing page</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
