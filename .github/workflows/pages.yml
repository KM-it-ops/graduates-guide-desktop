name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'app-icon.svg'
      - 'scripts/generate-social-card-og.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run generate:social-card

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/landing/assets
          cp app-icon.svg _site/
          cp landing/index.html _site/landing/
          cp landing/assets/readme-hero.png _site/landing/assets/
          cp landing/assets/social-card-og.png _site/landing/assets/
          cp landing/assets/hero-ui.svg _site/landing/assets/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0; url=landing/" />
            <title>The Graduate's Guide</title>
            <link rel="canonical" href="https://km-it-ops.github.io/graduates-guide-desktop/landing/" />
          </head>
          <body>
            <p><a href="landing/">The Graduate's Guide — landing page</a></p>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
