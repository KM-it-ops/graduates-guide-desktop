  <text x="100" y="250" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="24" fill="#94A3B8">Your job search lives in a folder you own.</text>
  <text x="100" y="300" font-family="IBM Plex Sans, Segoe UI, sans-serif" font-size="18" fill="#CBD5E1">Copy in the app. Send on the portal or in your mail client.</text>
